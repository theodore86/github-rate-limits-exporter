---
nameOverride: ""
fullnameOverride: ""
exporter:
  image: theodore86/prometheus-gh-rate-limit-exporter
  tag: v0.7.6
  pullPolicy: IfNotPresent
  port: 10050
  # Definition of the github credentials for either PAT or APP credentials
  # For PAT
  # github:
  #  accountName: theodore86
  #  authType: pat
  #  token: ""
  #
  # For APP
  # github:
  #   accountName: theodore86
  #   authType: app
  #   appID: ""
  #   installationID: ""
  #   mountPath: /secret
  #   privateKey: |
  #   ""
  #
  # For Github Enterprise Server, set baseUrl to the GHE API endpoint, e.g.:
  #   baseUrl: "https://github.example.com/api/v3"
  # Defaults to public github.com (https://api.github.com) when unset.
  github: {}
service:
  clusterIP: ""
  port: 80
  annotations: {}
  labels: {}
replicaCount: 1
terminationGracePeriodSeconds: 30
imagePullSecrets: []
serviceMonitor:
  enabled: false
  annotations: {}
# Liveness and readiness probes for the exporter container.
# The readiness probe scrapes the same /metrics endpoint Prometheus does,
# which means every probe causes a real Github API rate-limit call. For
# deployments where Prometheus already records scrape errors and you would
# rather not double the load on Github's rate-limit endpoint (or burn
# tokens against a private GHE quota), set this to false. The exporter is
# stateless and Prometheus's scrape-error metrics are sufficient for
# alerting in that case.
probes:
  enabled: true
resources:
  limits:
    cpu: 100m
    memory: 512Mi
  requests:
    memory: 512Mi
# Integration with Grafana operator
grafana:
  enabled: false
  labels: {}
  annotations: {}
podLabels: {}
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
tolerations: []
affinity: {}
nodeSelector: {}
priorityClassName: ""
