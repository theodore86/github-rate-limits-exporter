suite: test deployment
release:
  name: my-release
templates:
  - deployment.yaml
  - secret.yaml
  - configmap.yaml
tests:
  - it: tests defaults
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - equal:
          path: metadata.name
          value: my-release-github-rate-limits-exporter
      - equal:
          path: metadata.labels.app\.kubernetes\.io/name
          value: my-release-github-rate-limits-exporter
      - matchRegex:
          path: metadata.labels.helm\.sh/chart
          pattern: github-rate-limits-exporter-\d+\.\d+\.\d+
      - equal:
          path: metadata.labels.app\.kubernetes\.io/instance
          value: my-release
      - equal:
          path: metadata.labels.app\.kubernetes\.io/managed-by
          value: Helm
      - matchRegex:
          path: metadata.labels.app\.kubernetes\.io/version
          pattern: \d+\.\d+\.\d+
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.selector
          value:
            matchLabels:
              app.kubernetes.io/name: my-release-github-rate-limits-exporter
              app.kubernetes.io/instance: my-release
      - equal:
          path: spec.template.metadata.labels.app\.kubernetes\.io/managed-by
          value: Helm
      - matchRegex:
          path: spec.template.metadata.labels.app\.kubernetes\.io/version
          pattern: \d+\.\d+\.\d+
      - equal:
          path: spec.template.metadata.labels.app\.kubernetes\.io/name
          value: my-release-github-rate-limits-exporter
      - matchRegex:
          path: spec.template.metadata.labels.helm\.sh/chart
          pattern: github-rate-limits-exporter-\d+\.\d+\.\d+
      - equal:
          path: spec.template.metadata.labels.app\.kubernetes\.io/instance
          value: my-release
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^theodore86/prometheus-gh-rate-limit-exporter(:v?\d+\.\d+\.\d+)?$
      - equal:
          path: spec.template.spec.containers[0].name
          value: github-rate-limits-exporter
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - equal:
          path: spec.template.spec.containers[0].ports
          value:
            - name: metrics
              containerPort: 10050
              protocol: TCP
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value: {}
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 100m
              memory: 512Mi
            requests:
              memory: 512Mi
      - equal:
          path: spec.template.spec.affinity
          value: {}
      - equal:
          path: spec.template.spec.imagePullSecrets
          value: []
      - equal:
          path: spec.template.spec.nodeSelector
          value: {}
      - equal:
          path: spec.template.spec.securityContext
          value: {}
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 30
      - equal:
          path: spec.template.spec.tolerations
          value: []
  - it: tests different values
    template: deployment.yaml
    set:
      priorityClassName: "high-priority"
      podLabels:
        podLabel: value
      replicas: 2
      grafana:
        enabled: true
      podAnnotations:
        podAnnotation: value
      terminationGracePeriodSeconds: 15
      imagePullSecrets:
        - name: regcred
      podSecurityContext:
        runAsUser: 1000
        fsGroup: 1000
        runAsNonRoot: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
      exporter:
        image: theodore86/prometheus-gh-rate-limit-exporter
        tag: v0.7.1
        pullPolicy: Always
        port: 9090
        github:
          accountName: theodore86
          authType: APP
          appID: "1234567"
          logLevel: 4
          installationID: "12345678"
          mountPath: /secret
          privateKey: |
            myprivatekey
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      nodeSelector:
        nodeLabel: value
      affinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: security
                  operator: In
                  values:
                    - S1
            topologyKey: failure-domain.beta.kubernetes.io/zone
      tolerations:
        - key: "key"
          operator: "Equal"
          value: "value"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: "high-priority"
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 15
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: regcred
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/secret
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/config
      - equal:
          path: spec.template.metadata.annotations.podAnnotation
          value: value
      - equal:
          path: spec.template.metadata.labels.podLabel
          value: value
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsUser: 1000
            fsGroup: 1000
            runAsNonRoot: true
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "key"
              operator: "Equal"
              value: "value"
              effect: "NoSchedule"
      - equal:
          path: spec.template.spec.affinity
          value:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: security
                      operator: In
                      values:
                        - S1
                topologyKey: failure-domain.beta.kubernetes.io/zone
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            nodeLabel: value
      - equal:
          path: spec.template.spec.volumes
          value:
            - name: app-private-key
              secret:
                secretName: my-release-github-rate-limits-exporter
      - equal:
          path: spec.template.spec.containers[0].name
          value: github-rate-limits-exporter
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^theodore86/prometheus-gh-rate-limit-exporter(:v?\d+\.\d+\.\d+)?$
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: app-private-key
              readOnly: true
              mountPath: /secret
      - equal:
          path: spec.template.spec.containers[0].ports
          value:
            - name: metrics
              containerPort: 9090
              protocol: TCP
      - equal:
          path: spec.template.spec.containers[0].readinessProbe
          value:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe
          value:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 512Mi
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: GITHUB_ACCOUNT
              valueFrom:
                secretKeyRef:
                  key: accountName
                  name: my-release-github-rate-limits-exporter
            - name: GITHUB_AUTH_TYPE
              value: app
            - name: EXPORTER_LOG_LEVEL
              value: "4"
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  key: appID
                  name: my-release-github-rate-limits-exporter
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  key: installationID
                  name: my-release-github-rate-limits-exporter
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /secret/privateKey
  - it: tests nameoveride
    template: deployment.yaml
    set:
      nameOverride: gh-rl-exporter
    asserts:
      - equal:
          path: metadata.name
          value: my-release-gh-rl-exporter
  - it: tests fullnameoverride
    template: deployment.yaml
    set:
      fullnameOverride: gh-rl-exporter-fullname
    asserts:
      - equal:
          path: metadata.name
          value: gh-rl-exporter-fullname
  - it: tests authtype pat
    template: deployment.yaml
    set:
      fullnameOverride: gh-rl-exporter
      exporter:
        github:
          accountName: theodore86
          authType: pat
          token: 8rfdgf834343fgfvd
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: GITHUB_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: gh-rl-exporter
                  key: accountName
            - name: GITHUB_AUTH_TYPE
              value: pat
            - name: EXPORTER_LOG_LEVEL
              value: "4"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gh-rl-exporter
                  key: token
  - it: probes are rendered by default
    template: deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
  - it: probes can be disabled
    template: deployment.yaml
    set:
      probes:
        enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
  - it: tests authtype pat with github enterprise baseUrl
    template: deployment.yaml
    set:
      fullnameOverride: gh-rl-exporter
      exporter:
        github:
          accountName: theodore86
          authType: pat
          token: 8rfdgf834343fgfvd
          baseUrl: https://github.example.com/api/v3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_BASE_URL
            value: https://github.example.com/api/v3
  - it: tests authtype app with github enterprise baseUrl
    template: deployment.yaml
    set:
      fullnameOverride: gh-rl-exporter
      exporter:
        github:
          accountName: theodore86
          authType: app
          appID: "1234567"
          installationID: "12345678"
          mountPath: /secret
          privateKey: |
            myprivatekey
          baseUrl: https://github.example.com/api/v3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_BASE_URL
            value: https://github.example.com/api/v3
